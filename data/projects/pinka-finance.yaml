summary:
  en: >-
    Group-fundraising platform bridging bank transfers and on-chain money.
    Campaign & checkout app (Next.js 14) where backers pay by scanning a
    SEPA EPC QR code or on-chain via Monerium EURe on Gnosis Chain; Foundry
    smart-contract suite (PinkaFactory, PinkaToken, PinkaCrowdfund) supports
    four parallel investment paths — ERC677 transferAndCall, approve+invest,
    SEPA bank transfer via Monerium webhook, and Safe multisig.
  hr: >-
    Platforma za grupno financiranje koja spaja bankovne transfere i
    on-chain novac. Aplikacija za kampanje i checkout (Next.js 14) u kojoj
    uplatitelji plaćaju skeniranjem SEPA EPC QR koda ili on-chain kroz
    Monerium EURe na Gnosis Chainu; Foundry paket pametnih ugovora
    (PinkaFactory, PinkaToken, PinkaCrowdfund) podržava četiri paralelna
    puta ulaganja — ERC677 transferAndCall, approve+invest, SEPA transfer
    kroz Monerium webhook i Safe multisig.
highlights:
  - en: >-
      Runs standalone or framed inside Safe{Wallet} as a Safe App — the
      wallet SDK transparently routes transactions through the host Safe
    hr: >-
      Radi samostalno ili uokvirena unutar Safe{Wallet}a kao Safe App —
      wallet SDK transparentno usmjerava transakcije kroz host Safe
  - en: >-
      RLS-gated Supabase schema with Edge Functions orchestrating
      contribution state; no plaintext secrets (SEPA profile IDs stored as
      keccak256 hashes)
    hr: >-
      RLS-zaštićena Supabase shema s Edge Functions koje orkestriraju stanje
      uplata; bez čistih tajni (SEPA ID-evi profila spremljeni kao keccak256
      hashevi)
  - en: Bilingual (HR/EN) marketing site with a custom React i18n engine (CLDR plurals)
    hr: Dvojezični (HR/EN) marketing web s vlastitim React i18n engineom (CLDR plurali)
tags: [web3, nextjs, cloudflare, i18n, fintech, solidity]

summary:
  en: >-
    AI-native Croatian media platform of 20 active repositories, built
    end-to-end by one engineer. An automated pipeline (Whisper.cpp on Metal,
    NVIDIA Canary on Colab GPUs, pyannote diarization, Gemini via multi-region
    Vertex AI) has processed 1,843 podcast episodes into ~92,000 semantic RAG
    chunks, searchable through a public MCP server and a Flutter app that
    ships to web (WASM), iOS, Android and Android TV.
  hr: >-
    AI-native hrvatska medijska platforma od 20 aktivnih repozitorija,
    izgrađena end-to-end od jednog inženjera. Automatizirani pipeline
    (Whisper.cpp na Metalu, NVIDIA Canary na Colab GPU-ima, pyannote
    dijarizacija, Gemini kroz multi-region Vertex AI) obradio je 1.843
    epizode podcasta u ~92.000 semantičkih RAG chunkova, pretraživih kroz
    javni MCP server i Flutter aplikaciju za web (WASM), iOS, Android i
    Android TV.

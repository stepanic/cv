  - en: >-
      pay.domovina.ai — three payment formats from one form (SEPA EPC QR,
      Croatian HUB3 PDF417, EIP-681) with Safe 2/3 multisig routing of
      Monerium EURe on Gnosis Chain
    hr: >-
